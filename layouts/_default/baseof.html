<!doctype html>
<html lang="en-US">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ block "body-class" . }}page{{ end }}">
  <a href="#content" id="skipnav">Skip to main content</a>

  {{ partial "header.html" . }}

  <div id="content" role="main" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </div><!-- end content -->

  {{ partial "footer.html" . }}

  {{ partial "scripts.html" . }}
</body>
</html>
