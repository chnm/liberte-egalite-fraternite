<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/foundation-sites@6.5.3/dist/js/foundation.min.js"></script>
<script src="/js/app.js"></script>
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.PagefindUI) {
      new PagefindUI({ element: '#search', showSubResults: true, showImages: false });
    }
    if (window.jQuery && jQuery.fn.foundation) {
      jQuery(document).foundation();
    }
    // Browse "go to page N" jump box.
    document.querySelectorAll('.page-input form').forEach(function (f) {
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var base = f.getAttribute('data-base') || '/';
        var n = parseInt(f.elements.page.value, 10);
        if (!n || n < 1) return;
        window.location.href = (n === 1) ? base : base + 'page/' + n + '/';
      });
    });
  });
</script>
