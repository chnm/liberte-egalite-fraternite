<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/foundation-sites@6.5.3/dist/js/foundation.min.js"></script>
<script src="/js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.jQuery && jQuery.fn.foundation) {
      jQuery(document).foundation();
    }
    // Browse "go to page N" jump box.
    document.querySelectorAll('.page-input form').forEach(function (f) {
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var base = f.getAttribute('data-base') || '/';
        var n = parseInt(f.elements.page.value, 10);
        if (!n || n < 1) return;
        window.location.href = (n === 1) ? base : base + 'page/' + n + '/';
      });
    });
  });
</script>

{{ if eq .Type "search" }}
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    if (!window.PagefindUI) return;
    var ui = new PagefindUI({
      element: '#search',
      showImages: true,
      showSubResults: true,
      showEmptyFilters: false,
      pageSize: 10,
    });
    // Run the query passed from the header search form (/search/?q=...).
    var q = new URLSearchParams(location.search).get('q');
    if (q) { ui.triggerSearch(q); }
  });
</script>
{{ end }}
